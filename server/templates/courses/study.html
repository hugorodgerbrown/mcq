{% extends "base.html" %}
{% load static %}
{% block title %}{{ course.name }} — Study{% endblock %}

{% block header_right %}
  {% if not shared %}
    <a class="nav-link" href="{% url 'courses:detail' course.pk %}">Dashboard</a>
    <button class="btn btn-sm" x-data="{ c: false }"
            @click="navigator.clipboard.writeText('{{ share_url }}'); c = true; setTimeout(() => c = false, 1500)">
      <span x-text="c ? 'Copied!' : 'Share'">Share</span>
    </button>
  {% endif %}
{% endblock %}

{% block content %}
{{ study_data|json_script:"study-data" }}
<script src="{% static 'js/study.js' %}"></script>

<div x-data="study()">
  <template x-if="!exam">
    <div class="card" style="text-align: center;">
      <p class="muted">This course has no questions yet.</p>
      {% if not shared %}<a class="btn btn-primary" href="{% url 'courses:import' course.pk %}">Import questions</a>{% endif %}
    </div>
  </template>

  <template x-if="exam">
    <div>
      <!-- top bar -->
      <div class="row-between" style="margin: 20px 0;">
        <div>
          <div class="eyebrow" x-text="data.name"></div>
          <h1 class="page-title" x-text="deck ? deckLabel : exam.name"></h1>
        </div>
        <template x-if="deck">
          <button class="btn btn-ghost btn-sm" @click="home()">← All topics</button>
        </template>
      </div>

      <!-- exam picker (multiple exams) -->
      <template x-if="!deck && data.exams.length > 1">
        <div class="seg" style="margin-bottom: 14px; flex-wrap: wrap;">
          <template x-for="(ex, i) in data.exams" :key="ex.id">
            <button :class="i === examIdx && 'active'" @click="setExam(i)" x-text="ex.name"></button>
          </template>
        </div>
      </template>

      <!-- HOME: mode + deck list -->
      <template x-if="!deck">
        <div>
          <div class="seg" style="margin-bottom: 16px;">
            <button :class="mode === 'mcq' && 'active'" @click="setMode('mcq')">Multiple choice</button>
            <button :class="mode === 'flash' && 'active'" @click="setMode('flash')">Flashcards</button>
            <button :class="mode === 'exam' && 'active'" @click="setMode('exam')">Mock exam</button>
          </div>
          <p class="muted2" style="font-size: 13px; margin: 0 0 12px;"
             x-show="mode === 'exam'"
             x-text="'Mock exam: ' + exam.examSize + ' random questions, pass mark ' + exam.passMarkPct + '%.'"></p>
          <div class="stack">
            <button class="list-row" @click="startDeck('ALL')">
              <span style="font-weight: 700;">All questions</span>
              <span class="count" x-text="questions.length"></span>
            </button>
            <template x-for="t in topics" :key="t.name">
              <button class="list-row" @click="startDeck(t.name)">
                <span style="display: inline-flex; align-items: center; gap: 10px;">
                  <span class="dot" :style="'background:' + t.color"></span>
                  <span x-text="t.name"></span>
                </span>
                <span class="count" x-text="counts[t.name] || 0"></span>
              </button>
            </template>
          </div>
        </div>
      </template>

      <!-- MCQ -->
      <template x-if="deck && mode === 'mcq' && q">
        <div class="card">
          <div class="q-meta">
            <span style="display: inline-flex; align-items: center; gap: 8px;">
              <span class="dot" :style="'background:' + colorFor(q.cat)"></span>
              <span x-text="q.cat"></span>
            </span>
            <span class="score"><span class="ok" x-text="'✓ ' + hits"></span><span class="no" x-text="'✕ ' + (tries - hits)"></span></span>
          </div>
          <div class="q-meta" style="margin-top: -4px;">
            <span x-text="'Question ' + (pos + 1) + ' of ' + order.length"></span>
          </div>
          <div class="q-text" x-text="q.text"></div>
          <div class="options">
            <template x-for="letter in optOrder" :key="letter">
              <button class="option" :class="optionClass(letter)" :disabled="solved" @click="choose(letter)">
                <span class="key" x-text="letter"></span>
                <span x-text="q.options[letter]"></span>
              </button>
            </template>
          </div>
          <template x-if="solved && q.explanation">
            <div class="explanation">
              <span x-text="q.explanation"></span>
              <template x-if="q.source"><span class="src" x-text="'Source: ' + q.source"></span></template>
            </div>
          </template>
          <div class="toolbar">
            <button class="btn btn-primary" @click="next()" x-show="solved">Next →</button>
          </div>
        </div>
      </template>

      <!-- FLASHCARDS -->
      <template x-if="deck && mode === 'flash' && q">
        <div class="card">
          <div class="q-meta">
            <span style="display: inline-flex; align-items: center; gap: 8px;">
              <span class="dot" :style="'background:' + colorFor(q.cat)"></span>
              <span x-text="q.cat"></span>
            </span>
            <span class="score"><span class="ok" x-text="'✓ ' + hits"></span><span class="no" x-text="'✕ ' + (tries - hits)"></span></span>
          </div>
          <div class="q-meta" style="margin-top: -4px;">
            <span x-text="'Card ' + (pos + 1) + ' of ' + order.length"></span>
          </div>
          <div class="flash-card">
            <div>
              <div class="q-text" x-text="q.text"></div>
              <template x-if="flipped">
                <div>
                  <div class="flash-answer" x-text="q.correct + '. ' + q.options[q.correct]"></div>
                  <template x-if="q.explanation">
                    <div class="explanation" style="margin-top: 14px;" x-text="q.explanation"></div>
                  </template>
                </div>
              </template>
            </div>
          </div>
          <div class="toolbar" style="justify-content: center;">
            <button class="btn" @click="flipped = true" x-show="!flipped">Reveal answer</button>
            <template x-if="flipped">
              <div class="toolbar" style="margin: 0;">
                <button class="btn" style="border-color: var(--pink); color: var(--pink);" @click="grade(false)">Missed it</button>
                <button class="btn btn-primary" @click="grade(true)">Got it</button>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- MOCK EXAM (in progress) -->
      <template x-if="deck && mode === 'exam' && !finished && q">
        <div class="card">
          <div class="q-meta">
            <span x-text="'Question ' + (pos + 1) + ' of ' + order.length"></span>
            <span x-text="answeredCount + ' answered'"></span>
          </div>
          <div class="q-text" x-text="q.text"></div>
          <div class="options">
            <template x-for="letter in optOrder" :key="letter">
              <button class="option" :class="examAnswers[q.id] === letter && 'picked'" @click="examChoose(letter)">
                <span class="key" x-text="letter"></span>
                <span x-text="q.options[letter]"></span>
              </button>
            </template>
          </div>
          <div class="toolbar" style="justify-content: space-between;">
            <button class="btn btn-ghost" @click="examPrev()" :disabled="pos === 0">← Prev</button>
            <div class="toolbar" style="margin: 0;">
              <button class="btn" @click="examGoNext()" x-show="pos < order.length - 1">Next →</button>
              <button class="btn btn-primary" @click="examSubmit()" x-show="pos === order.length - 1">Submit exam</button>
            </div>
          </div>
        </div>
      </template>

      <!-- MOCK EXAM (results) -->
      <template x-if="deck && mode === 'exam' && finished">
        <div class="card" style="text-align: center;">
          <div class="result-verdict" :class="examResult.passed ? 'pass' : 'fail'"
               x-text="examResult.passed ? 'Passed' : 'Not passed'"></div>
          <div class="result-score" style="margin-top: 8px;">
            <span x-text="examResult.score"></span><span class="of" x-text="' / ' + examResult.total"></span>
          </div>
          <p class="muted2" x-text="'Pass mark: ' + examResult.passNeeded + ' correct (' + exam.passMarkPct + '%)'"></p>

          <div class="breakdown" style="text-align: left;">
            <template x-for="c in examResult.cats" :key="c.cat">
              <div class="breakdown-row">
                <span style="display: inline-flex; align-items: center; gap: 9px;">
                  <span class="dot" :style="'background:' + colorFor(c.cat)"></span>
                  <span x-text="c.cat"></span>
                </span>
                <span class="count" :style="'color:' + (c.pct >= 80 ? 'var(--lime)' : c.pct >= 50 ? 'var(--amber)' : 'var(--pink)')"
                      x-text="c.correct + '/' + c.total"></span>
              </div>
            </template>
          </div>

          <template x-if="examResult.review.length">
            <div style="text-align: left; margin-top: 18px;">
              <strong class="muted">Review — questions to revisit</strong>
              <template x-for="item in examResult.review" :key="item.q.id">
                <div class="review-item" style="border-color: var(--border); background: var(--surface);">
                  <div style="font-size: 14px;" x-text="item.q.text"></div>
                  <div class="muted2" style="font-size: 13px; margin-top: 6px;">
                    Your answer: <span style="color: var(--pink);" x-text="item.picked"></span> ·
                    Correct: <span style="color: var(--lime);" x-text="item.q.correct"></span>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <div class="toolbar" style="justify-content: center; margin-top: 20px;">
            <button class="btn" @click="home()">Back to topics</button>
            <button class="btn btn-primary" @click="startDeck(deck)">Retake</button>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
{% endblock %}
