{% load i18n %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block head_title %}{% endblock head_title %} · DSC1
        </title>
        <style>
            :root {
                --text: #f2f5fa;
                --muted: #8ea1c0;
                --accent: #CCFF66;
                --accent-text: #0a1424;
                --error: #FF6699;
                --field-bg: rgba(255, 255, 255, 0.06);
                --field-border: rgba(255, 255, 255, 0.12);
                --card-bg: rgba(255, 255, 255, 0.05);
                --card-border: rgba(255, 255, 255, 0.1);
            }
            * { box-sizing: border-box; }
            html, body { margin: 0; padding: 0; }
            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                color: var(--text);
                font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
                background: radial-gradient(ellipse at top, #12203a, #0a1424 55%, #060c17);
                background-attachment: fixed;
            }
            .auth-card {
                width: 100%;
                max-width: 420px;
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: 12px;
                padding: 24px;
            }
            .auth-card h1 {
                font-size: 26px;
                font-weight: 800;
                margin: 0 0 8px;
            }
            .auth-card p { color: var(--muted); margin: 0 0 16px; }
            .auth-card label { display: block; margin: 0 0 4px; font-size: 14px; color: var(--muted); }
            .auth-card input[type="text"],
            .auth-card input[type="email"],
            .auth-card input[type="password"] {
                width: 100%;
                background: var(--field-bg);
                border: 1px solid var(--field-border);
                border-radius: 10px;
                padding: 12px;
                color: var(--text);
                font-size: 15px;
            }
            .auth-card form p { margin: 0 0 16px; color: var(--text); }
            .auth-card button[type="submit"],
            .auth-card .btn-primary {
                width: 100%;
                background: var(--accent);
                color: var(--accent-text);
                font-weight: 700;
                font-size: 15px;
                border: none;
                border-radius: 10px;
                padding: 12px;
                cursor: pointer;
            }
            .auth-card a { color: var(--muted); text-decoration: none; }
            .auth-card a:hover { color: var(--accent); }
            .auth-links { margin-top: 16px; font-size: 14px; }
            .errorlist { list-style: none; padding: 0; margin: 4px 0 0; color: var(--error); font-size: 13px; }
            .messages { list-style: none; padding: 0; margin: 0 0 16px; }
            .messages li { color: var(--accent); font-size: 14px; }
            .helptext { color: var(--muted); font-size: 12px; }
        </style>
    </head>
    <body data-auth-base="dsc1">
        <main class="auth-card">
            {% if messages %}
                <ul class="messages">
                    {% for message in messages %}<li>{{ message }}</li>{% endfor %}
                </ul>
            {% endif %}
            {% block content %}{% endblock content %}
        </main>
    </body>
</html>
