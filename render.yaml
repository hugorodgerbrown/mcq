# Render blueprint — full Django web service + managed Postgres, single origin.
# The web service builds the React SPA, collects it as static, runs migrations,
# and serves it via gunicorn; DATABASE_URL is wired to the managed Postgres below.
databases:
  - name: mcq-db
    databaseName: mcq
    user: mcq
    plan: free # Render free Postgres expires ~30 days — move to a paid plan for production

services:
  - type: web
    name: mcq
    runtime: python
    rootDir: server # Python version comes from server/.python-version (3.12)
    plan: free # free web services sleep after inactivity — bump for production
    buildCommand: "cd .. && npm install && npm run build && cd server && pip install -e . && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py loaddata dsc1_demo && python manage.py ensure_superuser"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      # Set to your Render hostname, e.g. mcq.onrender.com (comma-separated for several).
      - key: ALLOWED_HOSTS
        sync: false
      # Wired to the managed Postgres above — no manual value needed.
      - key: DATABASE_URL
        fromDatabase:
          name: mcq-db
          property: connectionString
      # Admin superuser for the Django admin at /admin/ (data management).
      # Set both and each deploy will create-or-update this account. Leave unset
      # to skip; you can always create one manually with `createsuperuser`.
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      # Email is optional and NOT required to sign in — login/signup are email
      # + password with no verification step. These vars are only used if a
      # future feature (e.g. password reset) sends mail. Render blocks outbound
      # SMTP, so for Resend set EMAIL_HOST=smtp.resend.com and
      # EMAIL_HOST_PASSWORD=<re_… key> (or RESEND_API_KEY) to send over Resend's
      # HTTPS API; the DEFAULT_FROM_EMAIL domain must be verified in Resend.
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      # Anthropic API key for the PDF-to-questions importer. Without it, PDF
      # import is disabled (CSV import and everything else still work).
      - key: ANTHROPIC_API_KEY
        sync: false
