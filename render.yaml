services:
  - type: web
    name: dsc1-question-bank
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # SPA: serve index.html for any route so client-side state routes don't 404
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
